esphome:
  name: brink-ot-full
  friendly_name: Brink OT Full

esp8266:
  board: d1_mini

logger:
api:
ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: local
      path: ../components

brink_ventilation:
  id: my_brink
  in_pin: 4
  out_pin: 5
  update_interval: 1500ms

sensor:
  - platform: brink_ventilation
    type: T_SUPPLY_IN
    name: "Temp Czerpnia (T1)"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
  - platform: brink_ventilation
    type: T_SUPPLY_OUT
    name: "Temp Nawiew (T2)"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
  - platform: brink_ventilation
    type: T_EXHAUST_IN
    name: "Temp Wywiew (T3)"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
  - platform: brink_ventilation
    type: T_EXHAUST_OUT
    name: "Temp Wyrzutnia (T4)"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1

  - platform: brink_ventilation
    type: CURRENT_FLOW
    name: "Przepływ (TSP 52-53)"
    unit_of_measurement: "m³/h"
    accuracy_decimals: 0

  - platform: brink_ventilation
    type: BYPASS_STATUS
    name: "Bypass status (0-1-2)"
    accuracy_decimals: 0
  - platform: brink_ventilation
    type: CPID
    name: "Ciśnienie nawiewu (CPID)"
    unit_of_measurement: "Pa"
    accuracy_decimals: 0
  - platform: brink_ventilation
    type: CPOD
    name: "Ciśnienie wywiewu (CPOD)"
    unit_of_measurement: "Pa"
    accuracy_decimals: 0

  - platform: brink_ventilation
    type: U1
    name: "U1 (step 1)"
    unit_of_measurement: "m³/h"
    accuracy_decimals: 0
  - platform: brink_ventilation
    type: U2
    name: "U2 (step 2)"
    unit_of_measurement: "m³/h"
    accuracy_decimals: 0
  - platform: brink_ventilation
    type: U3
    name: "U3 (step 3)"
    unit_of_measurement: "m³/h"
    accuracy_decimals: 0
  - platform: brink_ventilation
    type: U4
    name: "U4 (bypass atmo threshold)"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
  - platform: brink_ventilation
    type: U5
    name: "U5 (bypass indoor threshold)"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
  - platform: brink_ventilation
    type: I1
    name: "I1 (imbalance)"
    unit_of_measurement: "%"
    accuracy_decimals: 0

  # === Nowe sensory - RPM wentylatorów ===
  - platform: brink_ventilation
    type: RPM_EXHAUST
    name: "RPM wywiew"
    unit_of_measurement: "RPM"
    icon: "mdi:fan"
    accuracy_decimals: 0
  - platform: brink_ventilation
    type: RPM_SUPPLY
    name: "RPM nawiew"
    unit_of_measurement: "RPM"
    icon: "mdi:fan"
    accuracy_decimals: 0

  # === Nowe sensory - temperatury dodatkowe ===
  - platform: brink_ventilation
    type: TEMP_ATMO
    name: "Temp atmosfera"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 0
  - platform: brink_ventilation
    type: TEMP_INDOORS
    name: "Temp wewnętrzna"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 0

  # === Nowe sensory - objętości ===
  - platform: brink_ventilation
    type: MAX_VOL
    name: "Objętość MAX"
    unit_of_measurement: "m³/h"
    icon: "mdi:air-filter"
    accuracy_decimals: 0
  - platform: brink_ventilation
    type: MIN_VOL
    name: "Objętość MIN"
    unit_of_measurement: "m³/h"
    icon: "mdi:air-filter"
    accuracy_decimals: 0
  - platform: brink_ventilation
    type: CURRENT_INPUT_VOL
    name: "Objętość wejściowa"
    unit_of_measurement: "m³/h"
    icon: "mdi:air-filter"
    accuracy_decimals: 0
  - platform: brink_ventilation
    type: CURRENT_OUTPUT_VOL
    name: "Objętość wyjściowa"
    unit_of_measurement: "m³/h"
    icon: "mdi:air-filter"
    accuracy_decimals: 0

  # === Nowe sensory - komunikaty operacyjne ===
  - platform: brink_ventilation
    type: MSG_OPERATION
    name: "Kod operacji"
    icon: "mdi:message-alert"
    accuracy_decimals: 0

  # === TSP 57-59, 68-71 ===
  - platform: brink_ventilation
    type: VOLTAGE_PARAM1
    name: "Napięcie param1 (wilgoć)"
    unit_of_measurement: "V"
    icon: "mdi:flash"
    accuracy_decimals: 1
  - platform: brink_ventilation
    type: VOLTAGE_PARAM2
    name: "Napięcie param2 (CO2)"
    unit_of_measurement: "V"
    icon: "mdi:flash"
    accuracy_decimals: 1
  - platform: brink_ventilation
    type: FROST_STATUS
    name: "Status mrozu"
    icon: "mdi:snowflake-alert"
    accuracy_decimals: 0
  - platform: brink_ventilation
    type: TEMP2_ATMO
    name: "Temp2 atmosfera"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 0
  - platform: brink_ventilation
    type: TEMP2_INDOORS
    name: "Temp2 wewnętrzna"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 0
  - platform: brink_ventilation
    type: TEMP_POSTHEATER
    name: "Temp po podgrzewaczu"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 0

number:
  - platform: brink_ventilation
    type: VENTILATION
    name: "Nastawa mocy (ID71)"
  - platform: brink_ventilation
    type: U1
    name: "U1 preset (write)"
    unit_of_measurement: "m³/h"
  - platform: brink_ventilation
    type: U2
    name: "U2 preset (write)"
    unit_of_measurement: "m³/h"
  - platform: brink_ventilation
    type: U3
    name: "U3 preset (write)"
    unit_of_measurement: "m³/h"

binary_sensor:
  - platform: brink_ventilation
    type: FILTER_STATUS
    name: "Filtr - status"
  - platform: brink_ventilation
    type: FAULT_INDICATION
    name: "Błąd / Awaria"
  - platform: brink_ventilation
    type: VENTILATION_MODE
    name: "Tryb wentylacji"
  - platform: brink_ventilation
    type: INIT_STATUS
    name: "Urządzenie zainicjalizowane"

text_sensor:
  - platform: brink_ventilation
    type: STATUS
    name: "Status komunikacji"
  - platform: brink_ventilation
    type: BYPASS_STATUS_TEXT
    name: "Bypass status (tekst)"
  - platform: brink_ventilation
    type: MSG_OPERATION_TEXT
    name: "Komunikat operacyjny"
    icon: "mdi:message-text"

select:
  - platform: brink_ventilation
    type: BYPASS_CONTROL
    name: "Bypass sterowanie"
    icon: "mdi:valve"
  - platform: brink_ventilation
    type: VENTILATION_PRESET
    name: "Preset wentylacji"
    icon: "mdi:fan-auto"
