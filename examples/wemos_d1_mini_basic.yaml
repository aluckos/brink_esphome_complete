esphome:
  name: brink-ot
  friendly_name: Brink OT
  on_boot:
    priority: -100  # Start after API connects (default priority -100 is after API)
    then:
      - logger.log: "System boot complete, API connected - enabling OpenTherm polling"
      - lambda: |-
          id(my_brink).enable_polling();

esp8266:
  board: d1_mini

logger:
api:
ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: local
      path: ../components

brink_ventilation:
  id: my_brink
  in_pin: 4
  out_pin: 5
  update_interval: 1500ms

sensor:
  - platform: brink_ventilation
    type: T_SUPPLY_IN
    name: "Temp Czerpnia (T1)"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1

  - platform: brink_ventilation
    type: T_SUPPLY_OUT
    name: "Temp Nawiew (T2)"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1

  - platform: brink_ventilation
    type: T_EXHAUST_IN
    name: "Temp Wywiew (T3)"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1

  - platform: brink_ventilation
    type: T_EXHAUST_OUT
    name: "Temp Wyrzutnia (T4)"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1

  - platform: brink_ventilation
    type: CURRENT_FLOW
    name: "Przepływ (TSP 52-53)"
    unit_of_measurement: "m³/h"
    accuracy_decimals: 0

  - platform: brink_ventilation
    type: BYPASS_STATUS
    name: "Bypass status (0-1-2)"
    accuracy_decimals: 0

number:
  - platform: brink_ventilation
    name: "Nastawa mocy (ID71)"

binary_sensor:
  - platform: brink_ventilation
    type: FILTER_STATUS
    name: "Filtr - status"

text_sensor:
  - platform: brink_ventilation
    type: STATUS
    name: "Status komunikacji"

  - platform: brink_ventilation
    type: BYPASS_STATUS_TEXT
    name: "Bypass status (tekst)"
